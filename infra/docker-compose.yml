version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vektra}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-vektra}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-http://localhost:8001,http://127.0.0.1:8001}
    volumes:
      - ../backend:/app
    working_dir: /app
    depends_on:
      - db
    ports:
      - "8000:8000"
  web:
    build: ../frontend/django_project
    command: python manage.py runserver 0.0.0.0:8001
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ../frontend/django_project:/srv/vektra
    working_dir: /srv/vektra
    depends_on:
      - db
    ports:
      - "8001:8001"

volumes:
  db_data:
