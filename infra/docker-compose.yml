version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vektra
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend:/app
    working_dir: /app
    depends_on:
      - db
    ports:
      - "8000:8000"
  web:
    build: ../frontend/django_project
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ../frontend/django_project:/srv/vektra
    working_dir: /srv/vektra
    depends_on:
      - db
    ports:
      - "8001:8001"

volumes:
  db_data:
